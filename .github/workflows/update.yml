name: Daily data update

on:
  schedule:
    - cron: '30 9 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Fetch all data sources
        env:
          SEC_USER_AGENT: 'SmartMoneyTracker (github.com/${{ github.repository }})'
        run: npm run fetch-data

      - name: Commit updated data
        run: |
          git config user.name "smart-money-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/aggregate.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: daily update $(date -u +'%Y-%m-%d')"
            git push
          fi
